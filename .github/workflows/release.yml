name: Release
on:
  push:
    branches:
      - testing
jobs:
  release:
    name: Release
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v1
      - name: Setup Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 12
      - name: Install dependencies
        run: npm ci
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          YELLOW: ${{ secrets.HI }}
        run: echo ${{ secrets.HI }} && echo $GH_TOKEN && echo $YELLOW && echo $NPM_TOKEN && "3-$YELLOW" && npx semantic-release
