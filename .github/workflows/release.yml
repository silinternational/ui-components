name: Release
on:
  push:
    branches:
      - testing
jobs:
  release:
    name: Release
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v1
      - name: Setup Node.js
        uses: actions/setup-node@v1
        with:
          node-version: 12
      - name: Install dependencies
        run: npm ci
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          YELLOW: ${{ secrets.HI }}
        run: echo "one-${{ secrets.HI }}" && echo "twol-$GH_TOKEN" && echo "3-$YELLOW" && echo "4-$NPM_TOKEN"
